<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot International Hotel</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
            background-color: #050a18 !important;
            color: #ffffff !important;
            overflow-x: hidden;
            scroll-behavior: smooth; /* በተኑ ሲነካ ገጹ እያለሰለሰ እንዲወርድ ያደርጋል */
        }
        .hero-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, #0a1931 0%, #050c1a 100%) !important;
        }
        .location-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }
        .hero-title {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.15;
            margin: 0 0 20px 0;
            max-width: 750px;
            color: #ffffff !important;
            letter-spacing: -0.5px;
        }
        .hero-desc {
            font-size: 1.15rem;
            color: #8fa0bc;
            max-width: 580px;
            margin: 0 0 40px 0;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 60px;
        }
        .custom-btn {
            padding: 16px 32px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
            cursor: pointer;
        }
        .btn-blue {
            background-color: #0066ff !important;
            color: #ffffff !important;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
        }
        .btn-outline {
            background-color: transparent;
            color: #ffffff !important;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
        .custom-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        .metrics-row {
            display: flex;
            gap: 50px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 35px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .metric-box {
            text-align: left;
        }
        .metric-num {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0066ff !important;
            display: block;
            line-height: 1;
            margin-bottom: 5px;
        }
        .metric-text {
            font-size: 0.85rem;
            color: #647796;
            font-weight: 500;
        }

        /* 🌟 አዲሱ የ Our Services ክፍል ስታይል */
        .services-section {
            padding: 80px 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }
        .services-section h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #ffffff;
        }
        .services-section p.sub {
            color: #8fa0bc;
            margin-bottom: 50px;
            font-size: 1.1rem;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .service-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: left;
            transition: all 0.3s ease;
        }
        .service-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-5px);
            border-color: rgba(0, 102, 255, 0.3);
        }
        .service-icon {
            font-size: 2.5rem;
            margin-bottom: 20px;
            display: inline-block;
        }
        .service-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        .service-card p {
            color: #8fa0bc;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }

        @media (max-width: 600px) {
            .hero-title { font-size: 2.1rem; }
            .button-group { flex-direction: column; width: 100%; max-width: 300px; }
            .metrics-row { gap: 25px; }
            .metric-num { font-size: 1.6rem; }
            .services-section h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="hero-viewport">
        
        <div class="location-badge">📍 WORABE, ETHIOPIA</div>
