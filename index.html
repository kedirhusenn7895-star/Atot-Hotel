<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot International Hotel | አቶት ሆቴል</title>
    <style>
        /* 1. መሠረታዊ ቅንብር */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
            overflow-x: hidden; /* ወደ ጎን እንዳይወጣ */
        }

        /* 2. አኒሜሽን ዲፋይን ማድረጊያ (Keyframes) */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 3. ሄደር (Header) */
        header {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=1200') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 120px 20px;
            animation: fadeIn 1.5s ease-in;
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            animation: fadeInUp 1s ease-out;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        header p {
            font-size: 1.3rem;
            animation: fadeInUp 1.2s ease-out;
            color: #f39c12;
        }

        /* 4. ማውጫ (Navigation) */
        nav {
            background-color: #1a252f;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 10px 0;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
            transition: all 0.4s ease; /* አኒሜሽን እዚህ ጋር ነው */
            border-radius: 20px;
        }

        nav ul li a:hover {
            background-color: #f39c12;
            color: #1a252f;
            transform: scale(1.1); /* ትንሽ ተለቅ ይላል */
        }

        /* 5. ኮንቴይነር */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
        }

        section {
            background: white;
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            animation: fadeInUp 1s ease-out; /* ሲከፈት ይንቀሳቀሳል */
        }

        h2 {
            color: #2c3e50;
            border-left: 5px solid #f39c12;
            padding-left: 15px;
        }

        /* 6. አገልግሎቶች ግሪድ (Grid) */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .service-card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #eee;
            transition: all 0.3s ease; /* አኒሜሽን */
            cursor: pointer;
        }

        /* ካርዶቹ ላይ ጣት ሲያርፍ የሚሆን እንቅስቃሴ */
        .service-card:hover {
            transform: translateY(-15px); /* ወደ ላይ ከፍ ይላል */
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border-color: #f39c12;
        }

        .service-card h3 {
            color: #f39c12;
            margin-top: 0;
        }
