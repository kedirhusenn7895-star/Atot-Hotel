<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot International Hotel</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
            background-color: #050a18 !important;
            color: #ffffff !important;
            overflow-x: hidden;
        }
        .hero-viewport {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, #0a1931 0%, #050c1a 100%) !important;
        }
        .location-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }
        .hero-title {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.15;
            margin: 0 0 20px 0;
            max-width: 750px;
            color: #ffffff !important;
            letter-spacing: -0.5px;
        }
        .hero-desc {
            font-size: 1.15rem;
            color: #8fa0bc;
            max-width: 580px;
            margin: 0 0 40px 0;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 60px;
        }
        .custom-btn {
            padding: 16px 32px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .btn-blue {
            background-color: #0066ff !important;
            color: #ffffff !important;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
        }
        .btn-outline {
            background-color: transparent;
            color: #ffffff !important;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
        .custom-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        .metrics-row {
            display: flex;
            gap: 50px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 35px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
        }
        .metric-box {
            text-align: left;
        }
        .metric-num {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0066ff !important;
            display: block;
            line-height: 1;
            margin-bottom: 5px;
        }
        .metric-text {
            font-size: 0.85rem;
            color: #647796;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            .hero-title { font-size: 2.1rem; }
            .button-group { flex-direction: column; width: 100%; max-width: 300px; }
            .metrics-row { gap: 25px; }
            .metric-num { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="hero-viewport">
        
        <div class="location-badge">📍 WORABE, ETHIOPIA</div>
        
        <h1 class="hero-title">The Heart of Atot's Luxury & Business</h1>
        
        <p class="hero-desc">
            Atot International Hotel combines modern comfort, premium dining, and exceptional hospitality right in the center of Worabe.
        </p>

        <div class="button-group">
            <a href="https://t.me/Zeru_Re" class="custom-btn btn-blue">Book a Room Now 🛌</a>
            <a href="https://t.me/Zeru_Re" class="custom-btn btn-outline">Our Services ✨</a>
        </div>

        <div class="metrics-row">
            <div class="metric-box">
                <span class="metric-num">50+</span>
                <span class="metric-text">Premium Rooms</span>
            </div>
            <div class="metric-box">
                <span class="metric-num">5★</span>
                <span class="metric-text">Service Quality</span>
            </div>
            <div class="metric-box">
                <span class="metric-num">24/7</span>
                <span class="metric-text">Support Line</span>
            </div>
        </div>

    </div>

</body>
</html>
